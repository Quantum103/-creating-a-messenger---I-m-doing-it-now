<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpine Messenger — Профиль</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="static/css/settings.css">   

</head>
<body>
    <div class="snow" id="snow"></div>
    <div class="mountains">
        <div class="mountain" style="--scale: 1.1"></div>
        <div class="mountain" style="--scale: 0.85"></div>
        <div class="mountain" style="--scale: 1.2"></div>
        <div class="mountain" style="--scale: 0.9"></div>
    </div>

    <div class="form-container">
        <div style="position: relative; z-index: 2;">
            <div class="snowflake-deco">❄</div>
            <div class="snowflake-deco">❄</div>
        </div>
        
        <div class="form-header">
            <div class="logo">🏔️</div>
            <div class="logo-text">AlpineChat</div>
            <div class="subtitle">Редактирование профиля</div>
        </div>

        <!-- Блок 1: Имя  -->
        <form class="independent-form" id="formName" data-endpoint="/change/username">
            <div class="form-block-header">
                <div class="form-block-icon"></div>
                <div class="form-block-title">Изменить имя</div>
            </div>
            <div class="form-group">
                <label for="inputName">Ваше имя</label>
                <input type="text" id="inputName" class="form-control" placeholder="Введите имя" required name="newName">
                <div class="error-hint" id="errName">Минимум 2 символа</div>
            </div>
            <button type="submit" class="block-submit" id="btnName">
                <span class="spinner"></span>
                <span class="btn-text"> Сохранить имя</span>
            </button>
            <div class="block-status" id="statusName"></div>
        </form>

        <!--  Блок 2: Работа -->
        <form class="independent-form" id="formWork" data-endpoint="/change/work">
            <div class="form-block-header">
                <div class="form-block-icon"></div>
                <div class="form-block-title">Место работы</div>
            </div>
            <div class="form-group">
                <label for="inputWork">Где вы работаете</label>
                <input type="text" id="inputWork" class="form-control" placeholder="Например: Тинькофф" name="work_location">
            </div>
            <button type="submit" class="block-submit" id="btnWork">
                <span class="spinner"></span>
                <span class="btn-text"> Сохранить работу</span>
            </button>
            <div class="block-status" id="statusWork"></div>
        </form>

        <!--  Блок 3: Пароль  -->
        <form class="independent-form" id="formPass" data-endpoint="/change/Pass">
            <div class="form-block-header">
                <div class="form-block-icon"></div>
                <div class="form-block-title">Сменить пароль</div>
            </div>
            <div class="form-group">
                <label for="inputOldPass">Старый пароль</label>
                <div class="password-wrapper">
                    <input type="password" id="inputOldPass" class="form-control" placeholder="••••••••" name="OldPass">
                    <button type="button" class="toggle-password" onclick="togglePass('inputOldPass', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="inputNewPass">Новый пароль</label>
                <div class="password-wrapper">
                    <input type="password" id="inputNewPass" class="form-control" placeholder="Минимум 8 символов" minlength="8" name="OldPass">
                    <button type="button" class="toggle-password" onclick="togglePass('inputNewPass', this)">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="error-hint" id="errPass">Минимум 8 символов</div>
            </div>
            <button type="submit" class="block-submit" id="btnPass">
                <span class="spinner"></span>
                <span class="btn-text"> Обновить пароль</span>
            </button>
            <div class="block-status" id="statusPass"></div>
        </form>

        <!-- Блок 4: Город  -->
        <form class="independent-form" id="formCity" data-endpoint="/change/city">
            <div class="form-block-header">
                <div class="form-block-icon"></div>
                <div class="form-block-title">Город</div>
            </div>
            <div class="form-group">
                <label for="inputCity">Ваш город</label>
                <input type="text" id="inputCity" class="form-control" placeholder="Например: Москва" required name="city">
                <div class="error-hint" id="errCity">Введите название города</div>
            </div>
            <button type="submit" class="block-submit" id="btnCity">
                <span class="spinner"></span>
                <span class="btn-text"> Сохранить город</span>
            </button>
            <div class="block-status" id="statusCity"></div>
        </form>

    </div>

    <script src="static/js/settings.js"></script>
</body>
</html>
